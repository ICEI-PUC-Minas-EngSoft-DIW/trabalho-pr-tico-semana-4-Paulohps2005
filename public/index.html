<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body> 

    <!-- Cabeçalho -->
    <header class="cabecalho">
        <div class="esquerda">
            <div class="menu">☰</div>
            <img src="imagens/Logo.png" alt="logo" class="logo">
        </div>
        <nav class="info-nav">
            <a href="#sobre">Sobre</a>
        </nav>
        <form class="search-form">
            <input type="text" placeholder="Pesquisar...">
            <button type="submit">Buscar</button>
        </form>
        <button class="login">Login</button>
    </header>

    <!-- Conteudo do site -->
    <main>
        <h1>Animes</h1>
        <section class="Populares">
            <h2>Populares</h2>
            <div class="alinhamento">
                <article class="anime">
                    <img src="imagens/Vinland.jpg" alt="Vinland saga" class="viking">
                    <p class="vinland"> Vinland Saga</p>
                </article>

                <article class="anime">
                    <img src="imagens/Bleach.jpg" alt="Bleach" class="almas">
                    <p class="Bleach"> Bleach</p>
                </article>

                <article class="anime">
                    <img src="imagens/Jujutsu.jpg" alt="Jujutsu" class="energia">
                    <p class="Jujutsu"> Jujutsu Kaisen</p>
                </article>

                <article class="anime">
                    <img src="imagens/Kimetsu.jpg" alt="Kimetsu" class="onis">
                    <p class="Kimetsu"> Kimetsu no Yaiba</p>
                </article>

                <article class="anime">
                    <img src="imagens/Hunter_X_Hunter.jpg" alt="Hunter X Huntrt" class="mundo">
                    <p class="Hunter"> Hunter X Huntrt</p>           
                </article>
            </div>
        </section>
        <section class="Favoritos">
            <h2>Favoritos</h2>
            <div class="alinhamento">
                <article class="anime">
                    <img src="imagens/attack_on_titan.jpg" alt="Attack on titan" class="titan">
                    <p class="mura"> Attack on Titan</p>
                </article>

                <article class="anime">
                    <img src="imagens/Dan_da_Dan.jpg" alt="Dan da Dan" class="Dan">
                    <p class="velha"> Dan da Dan</p>
                </article>

                <article class="anime">
                    <img src="imagens/Haikyull.jpg" alt="Haikyull" class="volei">
                    <p class="bola"> Haikyull</p>
                </article>

                <article class="anime">
                    <img src="imagens/One_piece.jpg" alt="One Piece" class="pirata">
                    <p class="estica"> One Piece</p>
                </article>

                <article class="anime">
                    <img src="imagens/My_Hero_Academy.jpg" alt="My Hero Academy" class="heroi">
                    <p class="Deko">My Hero Academy</p>
                </article>
            </div>
        </section>
    </main>
    <footer class=Rodape> Percebi que preciso aprender muito ainda.</footer>
</body>
</html>
